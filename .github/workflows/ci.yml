# =============================================================================
# CI 工作流 — 持续集成检查 (Continuous Integration)
# =============================================================================
#
# 项目：TaoLang — 道语言编译器 & 包管理器
#
# 功能说明：
#   本工作流在每次代码推送到主分支或 Pull Request 时自动运行，执行以下检查：
#   1. 跨平台编译 — 确保代码在 Windows/Linux/macOS 上均可编译通过
#   2. 单元测试   — 运行项目中的所有测试，验证功能正确性
#   3. Release 构建 — 验证 release profile（fat LTO 等）下也能正常编译
#   4. Clippy      — Rust 官方 lint 工具，检测常见错误和代码异味
#   5. Rustfmt     — 代码格式检查，确保团队统一代码风格
#   6. 依赖审计   — 检测依赖中已知的安全漏洞
#
# 平台说明：
#   taoc 依赖 LLVM 21.1.8 进行代码生成，在 3 个平台上并行构建：
#     - Windows x86_64  (windows-latest)
#     - Linux x86_64    (ubuntu-latest)
#     - macOS ARM       (macos-latest, Apple Silicon)
#   注：macOS Intel 无 LLVM 21.1.8 预编译包，暂不支持。
#   LLVM 预编译包通过 composite action (.github/actions/setup-llvm) 安装并缓存。
#   格式检查和安全审计不需要 LLVM，在 Ubuntu 上运行以加速执行。
# =============================================================================

name: CI

# ---------------------------------------------------------------------------
# 触发条件：
#   - push：向 master 或 main 分支推送代码时触发（排除 tag 推送，避免与发布工作流重复）
#   - pull_request：向 master 或 main 分支提交 PR 时触发
# ---------------------------------------------------------------------------
on:
  push:
    branches: [ master, main ]
    tags-ignore: ['**']
  pull_request:
    branches: [ master, main ]

# ---------------------------------------------------------------------------
# 全局环境变量
# ---------------------------------------------------------------------------
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  LLVM_VERSION: "21.1.8"

# ---------------------------------------------------------------------------
# 作业定义
# ---------------------------------------------------------------------------
jobs:

  # =========================================================================
  # 作业 1：跨平台编译 + 测试 + Clippy
  # =========================================================================
  # 使用矩阵策略在 3 个平台上并行构建。
  # LLVM 安装通过 composite action 统一处理，各平台差异封装在矩阵变量中。
  # =========================================================================
  build-and-test:
    name: Build & Test (${{ matrix.llvm_cache_key }})
    runs-on: ${{ matrix.runner }}

    strategy:
      # 某个平台失败不影响其他平台，一次性发现所有问题
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - runner: windows-latest
            llvm_package: "clang+llvm-21.1.8-x86_64-pc-windows-msvc"
            llvm_install: "C:/llvm"
            llvm_cache_key: "x86_64-pc-windows-msvc"
            extract_tool: "7z"
            stub_lib_ext: "lib"

          # Linux x86_64
          - runner: ubuntu-latest
            llvm_package: "LLVM-21.1.8-Linux-X64"
            llvm_install: "/opt/llvm"
            llvm_cache_key: "x86_64-linux"
            extract_tool: "tar"
            stub_lib_ext: "a"

          # macOS ARM (Apple Silicon)
          - runner: macos-latest
            llvm_package: "LLVM-21.1.8-macOS-ARM64"
            llvm_install: "/opt/llvm"
            llvm_cache_key: "aarch64-macos"
            extract_tool: "tar"
            stub_lib_ext: "a"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # 安装 LLVM（使用 composite action，封装下载/缓存/解压/桩库逻辑）
      - name: Setup LLVM
        uses: ./.github/actions/setup-llvm
        with:
          llvm-version: ${{ env.LLVM_VERSION }}
          llvm-package: ${{ matrix.llvm_package }}
          llvm-install: ${{ matrix.llvm_install }}
          cache-key: ${{ matrix.llvm_cache_key }}
          extract-tool: ${{ matrix.extract_tool }}
          stub-lib-ext: ${{ matrix.stub_lib_ext }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.llvm_cache_key }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.llvm_cache_key }}-cargo-

      - name: Check compilation
        run: cargo check --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release --verbose

      # continue-on-error: true — 当前阶段为软性检查
      # TODO: 项目稳定后改为 false
      - name: Run Clippy
        run: cargo clippy -- -D warnings
        continue-on-error: true

  # =========================================================================
  # 作业 2：代码格式检查 (Rustfmt)
  # =========================================================================
  # 不需要编译代码，也不需要 LLVM 环境，在 Ubuntu 上运行速度最快。
  # =========================================================================
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

  # =========================================================================
  # 作业 3：依赖安全审计 (cargo-deny)
  # =========================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run cargo-deny (advisories)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories
        continue-on-error: true
